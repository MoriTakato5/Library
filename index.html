/* ====================== Related-term inference ======================
   方針：出典論文の共有を主軸（+3点/件）、タグの重なりを補助（+1点/件）としてスコアリングし、
   同一用語内では上位4件を「関連の強い用語」として提示する。手動指定は行わない。
======================================================================= */

function computeRelated(term, allTerms, limit = 4) {
  const refs = new Set((term.references || []).map(r => r.trim().toLowerCase()).filter(Boolean));
  const tags = new Set(term.tags || []);

  const scored = allTerms
    .filter(t => t.id !== term.id)
    .map(t => {
      const otherRefs = new Set((t.references || []).map(r => r.trim().toLowerCase()).filter(Boolean));
      const otherTags = new Set(t.tags || []);
      let sharedRefs = 0;
      refs.forEach(r => { if (otherRefs.has(r)) sharedRefs++; });
      let sharedTags = 0;
      tags.forEach(tg => { if (otherTags.has(tg)) sharedTags++; });
      const score = sharedRefs * 3 + sharedTags * 1;
      return { term: t, score, sharedRefs, sharedTags };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || a.term.title.localeCompare(b.term.title, 'ja'));

  return scored.slice(0, limit);
}

function slugify(title) {
  const base = title
    .toLowerCase()
    .replace(/[（(].*?[）)]/g, '')
    .trim()
    .replace(/[^a-z0-9\u4e00-\u9fff\u3040-\u30ff]+/g, '-')
    .replace(/(^-|-$)/g, '');
  return base || ('term-' + Date.now().toString(36));
}

function uniqueId(baseTitle, existingIds) {
  let slug = slugify(baseTitle);
  let candidate = slug;
  let n = 2;
  while (existingIds.has(candidate)) {
    candidate = `${slug}-${n}`;
    n++;
  }
  return candidate;
}

/* ====================== Search ranking ======================
   方針：タイトル一致を最優先、続いてタグ、要約、本文（formula含む）の順で
   重み付けスコアを与え、ヒットしたものを降順に並べる。
================================================================= */

function bodyToSearchableText(term) {
  return (term.body || []).map(b => b.value).join(' ');
}

function scoreTermForQuery(term, q) {
  const query = q.toLowerCase().trim();
  if (!query) return 0;
  const title = term.title.toLowerCase();
  const tags = term.tags.join(' ').toLowerCase();
  const summary = (term.summary || '').toLowerCase();
  const body = bodyToSearchableText(term).toLowerCase();
  const classification = (term.classification || '').toLowerCase();
  const refs = (term.references || []).join(' ').toLowerCase();

  let score = 0;
  if (title === query) score += 100;
  else if (title.startsWith(query)) score += 60;
  else if (title.includes(query)) score += 40;

  if (tags.includes(query)) score += 18;
  if (classification.includes(query)) score += 10;
  if (summary.includes(query)) score += 8;
  if (refs.includes(query)) score += 6;
  if (body.includes(query)) score += 4;

  return score;
}

function rankBySearch(terms, query) {
  return terms
    .map(t => ({ term: t, score: scoreTermForQuery(t, query) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || a.term.title.localeCompare(b.term.title, 'ja'))
    .map(x => x.term);
}

/* ====================== UTIL: KaTeX render ====================== */

function MathText({ text }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.renderMathInElement) {
      window.renderMathInElement(ref.current, {
        delimiters: [{ left: '$', right: '$', display: false }],
        throwOnError: false,
      });
    }
  }, [text]);
  return <span ref={ref}>{text}</span>;
}

/* Inline KaTeX for a single $...$ segment */
function InlineMath({ tex }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      try { window.katex.render(tex, ref.current, { throwOnError: false, displayMode: false }); }
      catch(e) { ref.current.textContent = '$' + tex + '$'; }
    }
  }, [tex]);
  return <span ref={ref} />;
}

/*
 * RichText: renders body text with
 *   - $...$ inline math (via InlineMath)
 *   - **...** bold
 *   - term title matches → clickable link (onOpen)
 */
function RichText({ text, termLinks, onOpen }) {
  // Split text into math / non-math segments
  const segments = useMemo(() => {
    const segs = [];
    const re = /\$([^$]+)\$/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) segs.push({ type: 'text', value: text.slice(last, m.index) });
      segs.push({ type: 'math', value: m[1] });
      last = m.index + m[0].length;
    }
    if (last < text.length) segs.push({ type: 'text', value: text.slice(last) });
    return segs;
  }, [text]);

  // Split a plain-text chunk into bold / plain / link sub-parts
  function parseTextChunk(chunk) {
    const parts = [];
    // First handle **bold**
    const boldRe = /\*\*(.+?)\*\*/g;
    let last = 0, m;
    while ((m = boldRe.exec(chunk)) !== null) {
      if (m.index > last) parts.push({ type: 'plain', value: chunk.slice(last, m.index) });
      parts.push({ type: 'bold', value: m[1] });
      last = m.index + m[0].length;
    }
    if (last < chunk.length) parts.push({ type: 'plain', value: chunk.slice(last) });

    // Within plain parts, find term links
    if (!termLinks || termLinks.length === 0) return parts;
    const pattern = termLinks.map(e => e.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const linkRe = new RegExp(`(${pattern})`);
    const result = [];
    for (const part of parts) {
      if (part.type !== 'plain') { result.push(part); continue; }
      const tokens = part.value.split(linkRe);
      for (const tok of tokens) {
        if (!tok) continue;
        const entry = termLinks.find(e => e.text === tok);
        result.push(entry ? { type: 'link', value: tok, id: entry.id } : { type: 'plain', value: tok });
      }
    }
    return result;
  }

  return (
    <span>
      {segments.map((seg, i) => {
        if (seg.type === 'math') return <InlineMath key={i} tex={seg.value} />;
        return parseTextChunk(seg.value).map((part, j) => {
          if (part.type === 'bold') return <strong key={`${i}-${j}`}>{part.value}</strong>;
          if (part.type === 'link') return (
            <button key={`${i}-${j}`} onClick={() => onOpen(part.id)}
              className="text-[var(--indigo)] underline decoration-dotted hover:decoration-solid transition-all font-medium">
              {part.value}
            </button>
          );
          return <span key={`${i}-${j}`}>{part.value}</span>;
        });
      })}
    </span>
  );
}

function MathBlock({ tex }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      try {
        window.katex.render(tex, ref.current, { throwOnError: false, displayMode: true });
      } catch (e) { ref.current.textContent = tex; }
    }
  }, [tex]);
  return <div ref={ref} className="overflow-x-auto py-1"></div>;
}

/* ====================== Category / List page ====================== */

const PAGE_SIZE = 6;

function CategoryPage({ categoryKey, allTerms, onHome, onOpen, onCreate, initialTag, initialQuery }) {
  const cat = CATEGORIES[categoryKey];
  const [activeTags, setActiveTags] = useState(initialTag ? [initialTag] : []);
  const [query, setQuery] = useState(initialQuery || '');
  const [page, setPage] = useState(1);

  useEffect(() => { setPage(1); }, [activeTags, query]);
  useEffect(() => { setActiveTags(initialTag ? [initialTag] : []); }, [initialTag, categoryKey]);
  useEffect(() => { setQuery(initialQuery || ''); }, [initialQuery, categoryKey]);

  const filtered = useMemo(() => {
    const base = allTerms.filter(t => t.category === categoryKey)
      .filter(t => activeTags.length === 0 || activeTags.every(at => t.tags.includes(at)));
    if (!query.trim()) return base;
    return rankBySearch(base, query);
  }, [allTerms, categoryKey, activeTags, query]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const pageItems = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  const toggleTag = (tag) => {
    setActiveTags(prev => prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]);
  };

  const relevantTags = useMemo(() => {
    const counts = {};
    allTerms.filter(t => t.category === categoryKey).forEach(t => t.tags.forEach(tag => {
      counts[tag] = (counts[tag]||0)+1;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
  }, [allTerms, categoryKey]);



  return (
    <div className="max-w-3xl mx-auto px-6 py-10 fade-up">
      <div className="flex items-center gap-4 mb-2">
        <button onClick={onHome} className="text-[var(--ink-soft)] hover:text-[var(--ink)]" title="ホームへ">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
          </svg>
        </button>
        <h1 className="font-display text-3xl font-semibold flex-1">{cat.label}</h1>
        <button onClick={() => onCreate(categoryKey)} className="font-mono text-xs text-[var(--indigo)] border border-[var(--indigo)] rounded-sm px-3 py-1.5 hover:bg-[var(--indigo)] hover:text-[var(--paper-raised)] transition-colors whitespace-nowrap">
          ＋ 用語を追加
        </button>
      </div>
      <p className="text-sm text-[var(--ink-soft)] ml-9 mb-6">{cat.desc}</p>

      <div className="flex items-center gap-3 paper-card rounded-sm px-4 py-2.5 mb-5">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ink-soft)" strokeWidth="2">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="このカテゴリ内を検索"
          className="flex-1 bg-transparent outline-none text-sm"
        />
        {query && <button onClick={()=>setQuery('')} className="text-[var(--ink-soft)] text-xs font-mono">×</button>}
      </div>

      <div className="flex flex-wrap gap-1.5 mb-7">
        {relevantTags.map(tag => (
          <Tag key={tag} tag={tag} active={activeTags.includes(tag)} onClick={toggleTag} />
        ))}
      </div>

      {filtered.length > 0 && (
        <div className="flex items-center justify-between mb-4 font-mono text-xs text-[var(--ink-soft)]">
          <button disabled={page<=1} onClick={() => setPage(p => Math.max(1, p-1))}
            className="underline disabled:no-underline disabled:opacity-30">← 前へ</button>
          <span>{page}/{totalPages} ページ（全{filtered.length}件）</span>
          <button disabled={page>=totalPages} onClick={() => setPage(p => Math.min(totalPages, p+1))}
            className="underline disabled:no-underline disabled:opacity-30">次へ →</button>
        </div>
      )}

      <div className="grid gap-4">
        {pageItems.length === 0 && (
          <p className="text-sm text-[var(--ink-soft)] font-mono py-10 text-center">該当する用語が見つかりません。</p>
        )}
        {pageItems.map(term => (
          <TermCard key={term.id} term={term} onOpen={onOpen} onTagClick={toggleTag} />
        ))}

        {filtered.length > 0 && (
          <div className="flex items-center justify-between mt-2 font-mono text-xs text-[var(--ink-soft)]">
            <button disabled={page<=1} onClick={() => setPage(p => Math.max(1, p-1))}
              className="underline disabled:no-underline disabled:opacity-30">← 前へ</button>
            <span>{page}/{totalPages} ページ（全{filtered.length}件）</span>
            <button disabled={page>=totalPages} onClick={() => setPage(p => Math.min(totalPages, p+1))}
              className="underline disabled:no-underline disabled:opacity-30">次へ →</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ====================== Term Detail Page ====================== */

function TermDetailPage({ termId, allTerms, onHome, onOpen, onTagClick, onEdit }) {
  const term = allTerms.find(t => t.id === termId);
  if (!term) return null;
  const cat = CATEGORIES[term.category];
  const related = useMemo(() => computeRelated(term, allTerms), [term, allTerms]);

  // Build list of linkable term titles (sorted longest first to avoid partial matches)
  const termLinks = useMemo(() => {
    const entries = [];
    const seen = new Set();
    const add = (id, text) => {
      const t = text.trim();
      if (!t || seen.has(t)) return;
      // allow all-caps abbreviations ≥2 chars (MCP, VMI, QGP, DCS…), others ≥4 chars
      if (t.length < 2) return;
      if (t.length < 4 && !/^[A-Z0-9\-]{2,3}$/.test(t)) return;
      seen.add(t);
      entries.push({ id, text: t });
    };
    for (const t of allTerms) {
      if (t.id === term.id) continue;
      const title = t.title;
      // primary: before first （ or (
      const primary = title.replace(/[（(【\/].*/, '').trim();
      add(t.id, primary);
      // secondary: inside （…） – catches English equivalents
      const m = title.match(/[（(]([^）)]+)[）)]/);
      if (m) {
        const inner = m[1].trim();
        // skip if identical to primary or too generic (single word < 5 chars)
        if (inner !== primary) add(t.id, inner);
      }
      // also try English words before the slash (e.g. "Gas jet / Molecular beam")
      const slashPart = title.match(/\/\s*(.+?)(?:[（(]|$)/);
      if (slashPart) add(t.id, slashPart[1].trim());
    }
    return entries.sort((a, b) => b.text.length - a.text.length);
  }, [allTerms, term.id]);

  return (
    <div className="max-w-3xl mx-auto px-6 py-10 fade-up">
      <div className="flex items-center gap-4 mb-1">
        <button onClick={onHome} className="text-[var(--ink-soft)] hover:text-[var(--ink)]" title="ホームへ">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
          </svg>
        </button>
        <button onClick={() => onOpen(null, term.category)} className="font-mono text-xs text-[var(--indigo)] hover:underline">
          {cat.label}
        </button>
        <span className="text-[var(--ink-soft)] text-xs">/</span>
        <span className="font-mono text-xs text-[var(--ink-soft)]">{term.classification}</span>
        <span className="flex-1"></span>
        <button onClick={() => onEdit(term.id)} className="font-mono text-[11px] text-[var(--ink-soft)] border border-[var(--rule)] rounded-sm px-2.5 py-1 hover:border-[var(--indigo)] hover:text-[var(--indigo)] transition-colors whitespace-nowrap">
          編集
        </button>
      </div>

      <h1 className="font-display text-3xl font-semibold underline-grow inline-block mt-5 mb-4">{term.title}</h1>

      <div className="flex flex-wrap gap-1.5 mb-6">
        {term.tags.map(t => (
          <Tag key={t} tag={t} variant="vermilion" onClick={(tag) => onTagClick(tag, term.category)} />
        ))}
      </div>

      {term.references && term.references.length > 0 && (
        <div className="mb-10">
          <p className="font-mono text-[11px] text-[var(--ink-soft)] tracking-wide mb-1.5">出典 — REFERENCES</p>
          <ul className="space-y-1">
            {term.references.map((ref, i) => (
              <li key={i} className="text-xs text-[var(--ink-soft)] font-mono leading-relaxed">・{ref}</li>
            ))}
          </ul>
        </div>
      )}

      {/* explanation area, circular-motif styled */}
      <div className="relative paper-card rounded-md px-8 py-10 sm:px-12 sm:py-12 mb-10 overflow-hidden">
        <svg className="absolute -right-16 -top-16 opacity-[0.35] pointer-events-none" width="260" height="260" viewBox="0 0 260 260">
          <circle cx="130" cy="130" r="125" className="orbit-ring" fill="none"/>
          <circle cx="130" cy="130" r="90" className="orbit-ring" fill="none"/>
        </svg>
        <p className="font-mono text-[11px] tracking-[0.2em] text-[var(--indigo)] mb-6 relative">説明 — EXPLANATION</p>

        <div className="space-y-5 relative">
          {term.body.map((block, i) => {
            if (block.type === 'text') {
              return <p key={i} className="text-[15px] leading-[1.9] text-[var(--ink)]"><RichText text={block.value} termLinks={termLinks} onOpen={onOpen} /></p>;
            }
            if (block.type === 'formula') {
              return (
                <div key={i} className="bg-[var(--paper)] border border-[var(--rule)] rounded-sm px-4 py-3">
                  <MathBlock tex={block.value} />
                </div>
              );
            }
            if (block.type === 'graph') {
              return (
                <div key={i} className="bg-[var(--paper)] border border-[var(--rule)] rounded-sm px-4 py-3">
                  <GraphIllustration kind={block.value} />
                </div>
              );
            }
            return null;
          })}
        </div>
      </div>

      <div>
        <p className="font-mono text-xs text-[var(--ink-soft)] mb-1 tracking-wide">関連の強い用語</p>
        <p className="font-mono text-[10px] text-[var(--ink-soft)]/70 mb-3">出典論文の共有・タグの重なりから自動推定</p>
        {related.length === 0 && (
          <p className="text-xs text-[var(--ink-soft)] font-mono">関連付けられる用語がまだありません。</p>
        )}
        <div className="grid sm:grid-cols-2 gap-3">
          {related.map(({ term: r, sharedRefs, sharedTags }) => (
            <button key={r.id} onClick={() => onOpen(r.id)} className="paper-card rounded-sm text-left px-4 py-3 group">
              <p className="font-display text-sm font-semibold underline-grow inline-block">{r.title}</p>
              <p className="text-xs text-[var(--ink-soft)] mt-1 line-clamp-1">{r.summary}</p>
              <p className="font-mono text-[10px] text-[var(--vermilion)] mt-1.5">
                {sharedRefs > 0 && `共通出典 ${sharedRefs}件`}{sharedRefs > 0 && sharedTags > 0 && ' ・ '}{sharedTags > 0 && `共通タグ ${sharedTags}件`}
              </p>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

            className="w-full bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2 text-sm outline-none focus:border-[var(--indigo)] mb-2"
          >
            <option value="typical-cross-section">典型的な断面積カーブ</option>
            <option value="r-matrix-region">R-Matrix 内部・外部領域</option>
            <option value="breit-wigner">Breit-Wigner 共鳴形状</option>
            <option value="beam-apparatus">ビーム実験装置の模式図</option>
          </select>
          <div className="bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2">
            <GraphIllustration kind={block.value} />
          </div>
        </div>
      )}
    </div>
  );
}

function TermEditorPage({ editingId, allTerms, defaultCategory, onCancel, onSave, onDelete }) {
  const existing = editingId ? allTerms.find(t => t.id === editingId) : null;
  const [form, setForm] = useState(() => existing ? JSON.parse(JSON.stringify(existing)) : emptyTerm(defaultCategory));
  const [tagInput, setTagInput] = useState('');
  const [refInput, setRefInput] = useState('');
  const [error, setError] = useState('');

  const allKnownTags = useMemo(() => {
    const s = new Set(ALL_TAGS);
    allTerms.forEach(t => t.tags.forEach(tag => s.add(tag)));
    return Array.from(s).sort();
  }, [allTerms]);

  const addTag = (tag) => {
    const clean = tag.trim().replace(/\s+/g, '_');
    if (!clean) return;
    if (!form.tags.includes(clean)) setForm(f => ({ ...f, tags: [...f.tags, clean] }));
    setTagInput('');
  };
  const removeTag = (tag) => setForm(f => ({ ...f, tags: f.tags.filter(t => t !== tag) }));

  const addReference = () => {
    const clean = refInput.trim();
    if (!clean) return;
    setForm(f => ({ ...f, references: [...f.references, clean] }));
    setRefInput('');
  };
  const removeReference = (i) => setForm(f => ({ ...f, references: f.references.filter((_, idx) => idx !== i) }));

  const updateBlock = (index, newBlock) => {
    setForm(f => ({ ...f, body: f.body.map((b, i) => i === index ? newBlock : b) }));
  };
  const removeBlock = (index) => {
    setForm(f => ({ ...f, body: f.body.filter((_, i) => i !== index) }));
  };
  const moveBlock = (index, dir) => {
    setForm(f => {
      const arr = [...f.body];
      const target = index + dir;
      if (target < 0 || target >= arr.length) return f;
      [arr[index], arr[target]] = [arr[target], arr[index]];
      return { ...f, body: arr };
    });
  };
  const addBlock = (type) => {
    setForm(f => ({ ...f, body: [...f.body, { type, value: type === 'graph' ? 'typical-cross-section' : '' }] }));
  };

  const handleSave = () => {
    if (!form.title.trim()) { setError('タイトルを入力してください。'); return; }
    if (!form.classification.trim()) { setError('分類（Classification）を入力してください。'); return; }
    if (form.tags.length === 0) { setError('タグを最低1つ設定してください。'); return; }
    const cleanBody = form.body.filter(b => b.value && b.value.trim());
    if (cleanBody.length === 0) { setError('説明・式・図のいずれかを最低1つ入力してください。'); return; }

    const existingIds = new Set(allTerms.map(t => t.id));
    if (editingId) existingIds.delete(editingId);
    const id = editingId || uniqueId(form.title, existingIds);

    onSave({ ...form, id, body: cleanBody, summary: form.summary.trim() || cleanBody.find(b=>b.type==='text')?.value.slice(0,60) || '' });
  };

  return (
    <div className="max-w-3xl mx-auto px-6 py-10 fade-up">
      <div className="flex items-center gap-4 mb-8">
        <button onClick={onCancel} className="text-[var(--ink-soft)] hover:text-[var(--ink)]" title="戻る">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h1 className="font-display text-2xl font-semibold">{existing ? '用語を編集' : '新しい用語を追加'}</h1>
      </div>

      <div className="space-y-7">
        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">タイトル</label>
          <input
            value={form.title}
            onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
            placeholder="例：Penning Ionization（ペニング電離）"
            className="w-full bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2.5 text-sm outline-none focus:border-[var(--indigo)]"
          />
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">カテゴリ</label>
          <div className="flex gap-2">
            {Object.values(CATEGORIES).map(c => (
              <button
                key={c.key}
                type="button"
                onClick={() => setForm(f => ({ ...f, category: c.key }))}
                className={"flex-1 font-mono text-xs px-3 py-2 rounded-sm border " + (form.category === c.key ? 'bg-[var(--indigo)] text-white border-[var(--indigo)]' : 'border-[var(--rule)] text-[var(--ink-soft)]')}
              >{c.label}</button>
            ))}
          </div>
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">Classification（分類）</label>
          <input
            value={form.classification}
            onChange={e => setForm(f => ({ ...f, classification: e.target.value }))}
            placeholder="例：散乱理論 / 反応過程"
            className="w-full bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2.5 text-sm outline-none focus:border-[var(--indigo)]"
          />
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">タグ</label>
          <div className="flex flex-wrap gap-1.5 mb-2">
            {form.tags.map(t => (
              <span key={t} className="chip active flex items-center gap-1">
                #{t}
                <button type="button" onClick={() => removeTag(t)} className="ml-0.5">×</button>
              </span>
            ))}
          </div>
          <div className="flex gap-2">
            <input
              value={tagInput}
              onChange={e => setTagInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addTag(tagInput); } }}
              placeholder="新規タグ名を入力してEnter（例：Penning_Ionization）"
              className="flex-1 bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2 text-sm font-mono outline-none focus:border-[var(--indigo)]"
            />
            <button type="button" onClick={() => addTag(tagInput)} className="font-mono text-xs px-3 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">追加</button>
          </div>
          <div className="flex flex-wrap gap-1.5 mt-2.5">
            {allKnownTags.filter(t => !form.tags.includes(t)).slice(0, 14).map(t => (
              <button key={t} type="button" onClick={() => addTag(t)} className="chip">#{t}</button>
            ))}
          </div>
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">出典論文（複数可・関連用語の自動推定に使用）</label>
          <div className="space-y-1.5 mb-2">
            {form.references.map((ref, i) => (
              <div key={i} className="flex items-center justify-between bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-1.5">
                <span className="text-xs font-mono text-[var(--ink-soft)]">{ref}</span>
                <button type="button" onClick={() => removeReference(i)} className="text-[var(--vermilion)] text-xs ml-2">×</button>
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <input
              value={refInput}
              onChange={e => setRefInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addReference(); } }}
              placeholder="例：Itikawa (2009) J. Phys. Chem. Ref. Data — ..."
              className="flex-1 bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2 text-sm outline-none focus:border-[var(--indigo)]"
            />
            <button type="button" onClick={addReference} className="font-mono text-xs px-3 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">追加</button>
          </div>
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-1.5">要約（一覧カードに表示。空欄なら本文から自動生成）</label>
          <textarea
            value={form.summary}
            onChange={e => setForm(f => ({ ...f, summary: e.target.value }))}
            rows={2}
            placeholder="1〜2文程度の短い要約"
            className="w-full bg-[var(--paper-raised)] border border-[var(--rule)] rounded-sm px-3 py-2.5 text-sm outline-none focus:border-[var(--indigo)]"
          />
        </div>

        <div>
          <label className="font-mono text-xs text-[var(--ink-soft)] block mb-2">説明・式・図（円形エリアに表示される本文ブロック）</label>
          <div className="space-y-3">
            {form.body.map((block, i) => (
              <BodyBlockEditor
                key={i}
                block={block}
                index={i}
                onChange={updateBlock}
                onRemove={removeBlock}
                onMove={moveBlock}
                isFirst={i === 0}
                isLast={i === form.body.length - 1}
              />
            ))}
          </div>
          <div className="flex gap-2 mt-3">
            <button type="button" onClick={() => addBlock('text')} className="font-mono text-[11px] px-3 py-1.5 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">＋ 説明文</button>
            <button type="button" onClick={() => addBlock('formula')} className="font-mono text-[11px] px-3 py-1.5 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">＋ 数式</button>
            <button type="button" onClick={() => addBlock('graph')} className="font-mono text-[11px] px-3 py-1.5 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">＋ 図</button>
          </div>
        </div>

        {error && <p className="text-xs text-[var(--vermilion)] font-mono">{error}</p>}

        <div className="flex items-center justify-between pt-4 border-t border-[var(--rule)]">
          <div>
            {existing && (
              <button
                type="button"
                onClick={() => { if (confirm('この用語を削除しますか？元に戻せません。')) onDelete(existing.id); }}
                className="font-mono text-xs text-[var(--vermilion)] hover:underline"
              >この用語を削除</button>
            )}
          </div>
          <div className="flex gap-3">
            <button type="button" onClick={onCancel} className="font-mono text-xs px-4 py-2.5 border border-[var(--rule)] rounded-sm text-[var(--ink-soft)]">キャンセル</button>
            <button type="button" onClick={handleSave} className="font-mono text-xs px-5 py-2.5 bg-[var(--indigo)] text-white rounded-sm hover:bg-[var(--indigo-soft)]">保存する</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ====================== App Shell ====================== */

function App() {
  const [view, setView] = useState({ type: 'home' });
  const [userTerms, setUserTerms] = useState([]);
  const [deletedBuiltinIds, setDeletedBuiltinIds] = useState([]);
  const [editedBuiltinIds, setEditedBuiltinIds] = useState({}); // id -> edited term
  const [loaded, setLoaded] = useState(false);
  const [saveError, setSaveError] = useState(false);

  const STORAGE_KEY = 'library:user-data';

  const storageGet = async () => {
    if (window.storage) {
      const res = await window.storage.get(STORAGE_KEY, false);
      return res && res.value ? res.value : null;
    }
    return localStorage.getItem(STORAGE_KEY);
  };

  const storageSet = async (value) => {
    if (window.storage) {
      const result = await window.storage.set(STORAGE_KEY, value, false);
      return !!result;
    }
    try { localStorage.setItem(STORAGE_KEY, value); return true; } catch (e) { return false; }
  };

  // Load persisted state on mount
  useEffect(() => {
    (async () => {
      try {
        const raw = await storageGet();
        if (raw) {
          const parsed = JSON.parse(raw);
          setUserTerms(parsed.userTerms || []);
          setDeletedBuiltinIds(parsed.deletedBuiltinIds || []);
          setEditedBuiltinIds(parsed.editedBuiltinIds || {});
        }
      } catch (e) {
        // no saved data yet — fine, start fresh
      } finally {
        setLoaded(true);
      }
    })();
  }, []);

  const persist = async (next) => {
    try {
      const ok = await storageSet(JSON.stringify(next));
      setSaveError(!ok);
    } catch (e) {
      setSaveError(true);
    }
  };

  const allTerms = useMemo(() => {
    const builtins = TERMS
      .filter(t => !deletedBuiltinIds.includes(t.id))
      .map(t => editedBuiltinIds[t.id] ? editedBuiltinIds[t.id] : t);
    return [...builtins, ...userTerms];
  }, [userTerms, deletedBuiltinIds, editedBuiltinIds]);

  const goHome = () => setView({ type: 'home' });
  const goCategory = (categoryKey, opts={}) => setView({ type: 'category', categoryKey, tag: opts.tag, query: opts.query });
  const goTerm = (termId, fallbackCategory) => {
    if (!termId && fallbackCategory) { goCategory(fallbackCategory); return; }
    setView({ type: 'term', termId });
  };
  const goSearch = (q) => setView({ type: 'search', query: q });
  const goTagFromAnywhere = (tag, category) => goCategory(category, { tag });
  const goCreate = (categoryKey) => setView({ type: 'editor', editingId: null, defaultCategory: categoryKey });
  const goEdit = (termId) => setView({ type: 'editor', editingId: termId });

  const isBuiltinId = (id) => TERMS.some(t => t.id === id);

  const handleSaveTerm = (term) => {
    let nextUserTerms = userTerms;
    let nextEdited = editedBuiltinIds;
    let nextDeleted = deletedBuiltinIds;

    if (isBuiltinId(term.id)) {
      nextEdited = { ...editedBuiltinIds, [term.id]: term };
      setEditedBuiltinIds(nextEdited);
    } else {
      const exists = userTerms.some(t => t.id === term.id);
      nextUserTerms = exists ? userTerms.map(t => t.id === term.id ? term : t) : [...userTerms, term];
      setUserTerms(nextUserTerms);
    }
    persist({ userTerms: nextUserTerms, deletedBuiltinIds: nextDeleted, editedBuiltinIds: nextEdited });
    goTerm(term.id);
  };

  const handleDeleteTerm = (id) => {
    let nextUserTerms = userTerms;
    let nextDeleted = deletedBuiltinIds;
    let nextEdited = editedBuiltinIds;

    if (isBuiltinId(id)) {
      nextDeleted = [...deletedBuiltinIds, id];
      setDeletedBuiltinIds(nextDeleted);
    } else {
      nextUserTerms = userTerms.filter(t => t.id !== id);
      setUserTerms(nextUserTerms);
    }
    persist({ userTerms: nextUserTerms, deletedBuiltinIds: nextDeleted, editedBuiltinIds: nextEdited });
    goHome();
  };

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <p className="font-mono text-xs text-[var(--ink-soft)]">読み込み中…</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen">
      <header className="border-b border-[var(--rule)] sticky top-0 bg-[var(--paper)] z-10">
        <div className="max-w-3xl mx-auto px-6 py-3 flex items-center justify-between">
          <button onClick={goHome} className="font-display text-lg font-semibold tracking-tight">Library</button>
          <nav className="flex gap-4 font-mono text-xs text-[var(--ink-soft)]">
            {Object.values(CATEGORIES).map(c => (
              <button key={c.key} onClick={() => goCategory(c.key)}
                className={"hover:text-[var(--ink)] transition-colors " + (view.categoryKey===c.key ? 'text-[var(--vermilion)]' : '')}>
                {c.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {saveError && (
        <div className="max-w-3xl mx-auto px-6 pt-3">
          <p className="font-mono text-[11px] text-[var(--vermilion)] bg-[rgba(28,49,119,0.06)] border border-[var(--vermilion-soft)] rounded-sm px-3 py-2">
            保存に失敗しました（このプレビュー環境ではデータの永続化に対応していない可能性があります）。変更内容はこのセッション中のみ有効です。
          </p>
        </div>
      )}

      {view.type === 'home' && <Home onNavigate={goCategory} onSearch={goSearch} />}
      {view.type === 'category' && (
        <CategoryPage
          categoryKey={view.categoryKey}
          allTerms={allTerms}
          onHome={goHome}
          onOpen={goTerm}
          onCreate={goCreate}
          initialTag={view.tag}
          initialQuery={view.query}
        />
      )}
      {view.type === 'term' && (
        <TermDetailPage termId={view.termId} allTerms={allTerms} onHome={goHome} onOpen={goTerm} onTagClick={goTagFromAnywhere} onEdit={goEdit} />
      )}
      {view.type === 'search' && (
        <SearchResultsPage query={view.query} allTerms={allTerms} onHome={goHome} onOpen={goTerm} onTagClick={goTagFromAnywhere} />
      )}
      {view.type === 'editor' && (
        <TermEditorPage
          editingId={view.editingId}
          allTerms={allTerms}
          defaultCategory={view.defaultCategory}
          onCancel={() => view.editingId ? goTerm(view.editingId) : goHome()}
          onSave={handleSaveTerm}
          onDelete={handleDeleteTerm}
        />
      )}

      <footer className="max-w-3xl mx-auto px-6 py-12 text-center">
        <p className="font-mono text-[10px] text-[var(--ink-soft)] tracking-wide">
          Library — a dictionary for atomic &amp; molecular collision physics
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Babel Standaloneの自動スキャン機構（type="text/babel"属性によるDOMスキャン）を使わず、
  // ここで明示的に変換・実行する。file:// プロトコル下での動的 import 起因の失敗を避けるため。
  (function () {
    var sourceEl = document.getElementById('app-source');
    var code = sourceEl.textContent;
    try {
      var output = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]], sourceType: 'script' }).code;
      var script = document.createElement('script');
      script.textContent = output;
      document.body.appendChild(script);
    } catch (err) {
      var root = document.getElementById('root');
      root.innerHTML =
        '<div style="max-width:640px;margin:60px auto;padding:24px;border:1px solid #D4D0C4;border-radius:4px;font-family:sans-serif;">' +
        '<h2 style="margin:0 0 12px;">読み込みエラー</h2>' +
        '<p style="white-space:pre-wrap;color:#4A4F49;font-size:13px;">' + (err && err.message ? err.message : String(err)) + '</p>' +
        '</div>';
      console.error('Babel transform failed:', err);
    }
  })();
</script>
</body>
</html>
